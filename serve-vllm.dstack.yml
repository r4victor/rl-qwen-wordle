# Serve Qwen/Qwen3.5-4B with vLLM on a cloud GPU via dstack.
#
#   dstack apply -f serve-vllm.dstack.yml
#
# Serves the base model for a baseline eval. `type: task` forwards port 8000 to
# localhost while attached; run the env server + eval_wordle.py against it:
#
#   bash run_env_server.sh &
#   uv run eval_wordle.py --base-url http://localhost:8000/v1 --model Qwen/Qwen3.5-4B -n 50
#
# (For a trained adapter, serve with --enable-lora instead; see README §2.)
#

type: task
name: vllm-qwen35-4b

image: vllm/vllm-openai:latest

env:
  - MODEL=Qwen/Qwen3.5-4B
  # - HF_TOKEN   # only needed for gated models; Qwen3.5-4B is public

ports:
  - 8000

commands:
  - >
    vllm serve $MODEL
    --host 0.0.0.0 --port 8000
    --max-model-len 8192
    --gpu-memory-utilization 0.90
    --enable-auto-tool-choice --tool-call-parser hermes

resources:
  # 4B in bf16 (~9.3 GB weights) + KV cache fits comfortably on one 24 GB+ card.
  gpu: 24GB..48GB:1
  disk: 60GB
