# Serve a Wordle policy with vLLM on a cloud GPU via dstack.
#
#   dstack apply -f serve-vllm.dstack.yml                 # base model (baseline)
#   ADAPTER=your-user/qwen35-4b-wordle dstack apply -f serve-vllm.dstack.yml  # trained
#
# `type: task` forwards port 8000 to localhost while attached. Run the env
# server + eval against it (use --model wordle when an ADAPTER is served):
#
#   bash run_env_server.sh &
#   uv run eval_wordle.py --base-url http://localhost:8000/v1 --model wordle -n 50

type: task
name: vllm-wordle

image: vllm/vllm-openai:latest

env:
  # MODEL = base for baseline / LoRA, OR the HF repo of a full (--no-lora) model.
  - MODEL=Qwen/Qwen3.5-4B
  - ADAPTER= # HF repo of a LoRA adapter (empty = serve MODEL as-is)
  # - HF_TOKEN        # needed if the repo is private

ports:
  - 8000

commands:
  # If ADAPTER is set, pull it from HF and serve it as a LoRA module named "wordle".
  - |
    LORA=""
    if [ -n "$ADAPTER" ]; then
      hf download "$ADAPTER" --local-dir /adapter
      LORA="--enable-lora --lora-modules wordle=/adapter --max-lora-rank 16"
    fi
    vllm serve $MODEL --host 0.0.0.0 --port 8000 \
      --max-model-len 8192 --gpu-memory-utilization 0.90 \
      --enable-auto-tool-choice --tool-call-parser qwen3_xml $LORA

resources:
  # 4B in bf16 (~9.3 GB) + KV cache fits comfortably on one 24 GB+ card.
  gpu: 24GB..48GB:1
  disk: 60GB
