# GRPO-train Qwen/Qwen3.5-4B on Wordle, on a single cloud GPU via dstack.
#
#   dstack apply -f train.dstack.yml
#
# One node runs: the Wordle OpenEnv server (CPU, background), GRPO training
# (vLLM colocate, GPU), then a post-training eval (baseline vs trained).

type: task
name: wordle-grpo

# dstack base image. We ignore its CUDA/nvcc — torch and vLLM wheels bundle their
# own CUDA 12.9 runtime (the host driver just needs to support CUDA >=12.9).
python: "3.12"

env:
  - MODEL=Qwen/Qwen3.5-4B
  - LORA=false # set to false for full fine-tuning (uses 8-bit Adam to fit 80GB)
  - HF_XET_HIGH_PERFORMANCE=1 # faster Hub transfers via the Xet backend
  # Env-server concurrency must cover the generation batch (--batch-size below).
  - MAX_CONCURRENT_ENVS=64
  - TRL_EXPERIMENTAL_SILENCE=1
  # Set HF_REPO (+ HF_TOKEN as a secret) to push the trained adapter to HF Hub,
  # so it can be served in a separate run (see serve-vllm.dstack.yml).
  - HF_REPO
  - HF_TOKEN
  - WANDB_API_KEY
  - WANDB_PROJECT=qwen-wordle-grpo
  - CUDA_HOME=/usr/local/cuda # where the cuda-toolkit install lands (see commands)

files:
  - train_grpo.py
  - wordle_env.py
  - env_server.py
  - eval_wordle.py
  - run_env_server.sh

commands:
  # Install the CUDA 12.9 toolkit (nvcc + headers). vLLM JIT-compiles kernels (on H100 during
  # training too) and needs nvcc at /usr/local/cuda/bin. Match the cu129 stack.
  - apt-get update
  - apt-get update && apt-get install -y --no-install-recommends cuda-toolkit-12-9
  - ln -sf /usr/local/cuda-12.9 /usr/local/cuda
  - export PATH=/usr/local/cuda/bin:$PATH
  # CUDA 12.9 everything (runs on the 13.0 driver via backward compat):
  #  - the plain `vllm==0.23.0` PyPI wheel is CUDA-13 (needs libcudart.so.13); the
  #    explicit +cu129 wheel is the CUDA-12.9 build that matches cu129 torch
  #  - --torch-backend=cu129: cu129 torch (provides libcudart.so.12)
  #  - vllm 0.23.0 is TRL 1.7.0's max; transformers>=5.6.0 has the `qwen3_5` arch
  #  - flash-linear-attention: efficient (Triton/tilelang) kernels for Qwen3.5's
  #    GDN layers — much less activation memory + faster than the torch fallback.
  #    Its tilelang JIT-compiles CUDA, so it needs the cuda-toolkit installed above.
  - uv pip install --torch-backend=cu129
    "vllm @ https://github.com/vllm-project/vllm/releases/download/v0.23.0/vllm-0.23.0+cu129-cp38-abi3-manylinux_2_28_x86_64.whl"
    "trl==1.7.0" "transformers>=5.6.0" flash-linear-attention
    datasets accelerate peft trackio openai wandb bitsandbytes
    "openenv-textarena @ git+https://huggingface.co/spaces/openenv/wordle"
  # 1. Wordle OpenEnv server in the background.
  - bash run_env_server.sh &
  # 2. Wait until the server accepts connections (any HTTP reply = up).
  - |
    for i in $(seq 1 60); do
      curl -s -o /dev/null http://0.0.0.0:8001/ && break
      echo "waiting for env server ($i)..."; sleep 2
    done
  # 3. GRPO training (vLLM colocate). --no-lora when LORA=false. Push if HF_REPO set.
  - |
    [ -n "$HF_REPO" ] && PUSH="--push-to-hub $HF_REPO" || PUSH=""
    # Full FT needs a tighter memory budget than LoRA: smaller micro-batch (GDN's
    # torch fallback makes activations heavy) and a smaller vLLM slice.
    if [ "$LORA" = "false" ]; then
      MODE="--no-lora --micro-batch-size 2 --vllm-gpu-memory-utilization 0.15"
    else
      MODE="--micro-batch-size 4"
    fi
    python train_grpo.py --model $MODEL --env-url http://0.0.0.0:8001 \
      --vllm-mode colocate --group-size 8 --batch-size 32 --steps 30 \
      --enable-thinking --max-completion-length 2048 \
      $MODE --report-to wandb $PUSH
  # 4. Training freed the GPU — serve the model(s) and eval baseline vs trained.
  #    LoRA: one server hosts base + adapter. Full FT: the checkpoint is a full
  #    model, so serve base and trained separately.
  - |
    CKPT="outputs/$(basename $MODEL)-wordle-GRPO"
    # --enforce-eager: skip CUDA-graph compile (fast startup for a short eval).
    SERVE="--host 0.0.0.0 --port 8000 --gpu-memory-utilization 0.90 --max-model-len 8192 --enforce-eager --enable-auto-tool-choice --tool-call-parser qwen3_xml"
    # --enable-thinking so eval matches training (thinking on in both).
    EVAL="--base-url http://localhost:8000/v1 --enable-thinking -n 50"
    wait_vllm () {
      for i in $(seq 1 120); do
        curl -sf http://0.0.0.0:8000/health && return 0
        kill -0 "$1" 2>/dev/null || { echo "vllm serve died:"; tail -40 /tmp/vllm.log; return 1; }
        echo "waiting for vllm ($i)..."; sleep 5
      done
      return 1
    }
    if [ "$LORA" = "false" ]; then
      for M in "$MODEL" "$CKPT"; do    # baseline, then trained (both full models)
        vllm serve "$M" $SERVE > /tmp/vllm.log 2>&1 & PID=$!
        wait_vllm $PID || exit 1
        python eval_wordle.py --base-url http://localhost:8000/v1 --model "$M" -n 50
        kill $PID 2>/dev/null; wait $PID 2>/dev/null
      done
    else
      vllm serve "$MODEL" $SERVE --enable-lora --lora-modules wordle="$CKPT" --max-lora-rank 16 > /tmp/vllm.log 2>&1 & PID=$!
      wait_vllm $PID || exit 1
      python eval_wordle.py --base-url http://localhost:8000/v1 --model "$MODEL" -n 50  # baseline
      python eval_wordle.py --base-url http://localhost:8000/v1 --model wordle   -n 50  # trained
    fi

resources:
  # 4B + LoRA + colocated vLLM fits tightly one 48 GB card; 80 GB is comfortable.
  gpu: 80GB:1
  disk: 200GB

idle_duration: 1h
